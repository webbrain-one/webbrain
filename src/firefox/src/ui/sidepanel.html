<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebBrain</title>
  <!-- Theme bootstrap MUST load before the stylesheet so data-theme is set
       on <html> before any paint. External classic script (not inline,
       not module) — Firefox MV2's CSP also forbids inline without an
       explicit unsafe-inline, and modules are deferred so they'd run
       AFTER first paint. -->
  <script src="theme-bootstrap.js"></script>
  <link rel="stylesheet" href="../../styles/sidepanel.css">
  <link rel="stylesheet" href="../../vendor/katex/katex.min.css">
  <!-- KaTeX is loaded as classic scripts (not modules). They assign to
       window.katex and window.renderMathInElement so formatMarkdown can
       call them after inserting message HTML. -->
  <script defer src="../../vendor/katex/katex.min.js"></script>
  <script defer src="../../vendor/katex/auto-render.min.js"></script>
</head>
<body>
  <!-- Onboarding Overlay (shown on first launch only) -->
  <div id="onboarding" class="onboarding hidden">
    <div class="ob-card">
      <div class="ob-step-indicator">
        <span class="ob-step-dot active"></span>
        <span class="ob-step-dot"></span>
        <span class="ob-step-dot"></span>
      </div>

      <!-- Step 1: Welcome -->
      <div class="ob-step active" data-step="0">
        <div class="ob-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        <h2 data-i18n="ob.welcome.title"></h2>
        <p class="ob-body" data-i18n="ob.welcome.body"></p>
        <p class="ob-note" data-i18n="ob.welcome.note"></p>
      </div>

      <!-- Step 2: Act Mode Warning -->
      <div class="ob-step" data-step="1">
        <div class="ob-icon ob-icon-warn">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <h2 data-i18n="ob.act.title"></h2>
        <p class="ob-body" data-i18n="ob.act.body"></p>
        <ul class="ob-warn-list">
          <li data-i18n="ob.act.warn1"></li>
          <li data-i18n="ob.act.warn2"></li>
          <li data-i18n="ob.act.warn3"></li>
        </ul>
      </div>

      <!-- Step 3: Model setup -->
      <div class="ob-step" data-step="2">
        <div class="ob-icon ob-icon-key">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
        <h2 data-i18n="ob.tokens.title"></h2>
        <p class="ob-body" id="ob-provider-body" data-i18n="ob.tokens.body"></p>
        <div class="ob-provider-status" id="ob-provider-status" data-i18n="ob.tokens.scanning"></div>
        <div class="ob-local-models hidden" id="ob-local-models">
          <label class="ob-local-label" for="ob-local-model-select" data-i18n="ob.tokens.local_models_label"></label>
          <select class="ob-local-select" id="ob-local-model-select"></select>
          <p class="ob-note" data-i18n="ob.tokens.context_hint"></p>
          <p class="ob-note" data-i18n="ob.tokens.local_note"></p>
        </div>
        <ul class="ob-provider-list" id="ob-provider-list">
          <li data-i18n="ob.tokens.option_lmstudio"></li>
          <li data-i18n="ob.tokens.option_openai"></li>
          <li data-i18n="ob.tokens.option_other"></li>
        </ul>
      </div>

      <div class="ob-nav">
        <button class="ob-btn ob-btn-back hidden" id="ob-back" data-i18n="ob.btn.back"></button>
        <button class="ob-btn ob-btn-next" id="ob-next" data-i18n="ob.btn.next"></button>
        <button class="ob-btn ob-btn-settings hidden" id="ob-open-settings" data-i18n="ob.btn.settings"></button>
      </div>
      <button class="ob-skip hidden" id="ob-skip" data-i18n="ob.btn.skip"></button>
    </div>
  </div>

  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <select id="provider-select" title="LLM Provider"></select>
        <span id="status-dot" class="status-dot offline" data-i18n-title="sp.status.disconnected"></span>
      </div>
      <div class="header-right">
        <div id="language-wrapper" class="language-wrapper" data-i18n-title="sp.btn.language">
          <svg class="language-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <select id="language-select" data-i18n-aria-label="sp.btn.language"></select>
        </div>
        <button id="btn-verbose" data-i18n-title="sp.btn.verbose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </button>
        <button id="btn-settings" data-i18n-title="sp.btn.settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-clear" data-i18n-title="sp.btn.clear">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page Inspection Banner -->
    <div id="inspection-banner" class="hidden">
      <div class="inspection-dot"></div>
      <span data-i18n="sp.inspection"></span>
    </div>

    <div id="scheduled-jobs" class="scheduled-jobs hidden" aria-live="polite"></div>

    <!-- Chat Messages -->
    <div id="chat-container">
      <div id="messages">
        <div class="message system">
          <div class="message-content">
            <p data-i18n-html="sp.greeting.html"></p>
            <p class="hint" data-i18n="sp.greeting.hint"></p>
          </div>
        </div>
      </div>
      <div id="recommended-actions" class="recommended-actions hidden" aria-live="polite">
        <div class="recommended-actions-header">
          <div class="recommended-actions-title" data-i18n="sp.recommended.title">Suggested actions</div>
          <button
            id="recommended-actions-toggle"
            class="recommended-actions-toggle"
            type="button"
            aria-controls="recommended-actions-list"
            aria-expanded="true"
            data-i18n-title="sp.recommended.collapse"
            data-i18n-aria-label="sp.recommended.collapse"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
        </div>
        <div id="recommended-actions-list" class="recommended-actions-list"></div>
      </div>
    </div>

    <!-- Agent Activity Indicator -->
    <div id="agent-activity" class="hidden">
      <div class="activity-spinner"></div>
      <span id="activity-text" data-i18n="sp.activity.thinking"></span>
      <button id="btn-stop" data-i18n-title="sp.btn.stop.title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        <span data-i18n="sp.btn.stop.label"></span>
      </button>
    </div>

    <!-- Act Mode Warning Banner -->
    <div id="act-warning" class="hidden">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span data-i18n="sp.mode.act.warning"></span>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <div id="mode-toggle">
        <button id="btn-mode-ask" class="mode-btn active" data-i18n="sp.mode.ask" data-i18n-title="sp.mode.ask.title"></button>
        <button id="btn-mode-act" class="mode-btn" data-i18n="sp.mode.act" data-i18n-title="sp.mode.act.title"></button>
      </div>
      <div id="queued-messages" class="queued-messages hidden" role="list" aria-live="polite"></div>
      <div id="slash-command-menu" class="slash-command-menu hidden" role="listbox" data-i18n-aria-label="sp.slash.commands_label"></div>
      <div id="attachment-preview-list" class="attachment-preview-list hidden"></div>
      <input type="file" id="file-attach-input" accept="image/*,application/pdf,application/json,text/plain,text/csv,.json,.txt,.csv" multiple hidden>
      <div id="input-wrapper">
        <button id="btn-attach" data-i18n-title="sp.btn.attach">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
            <path d="m16 6-8.4 8.6a2 2 0 0 0 2.8 2.8l8.4-8.6a4 4 0 0 0-5.6-5.6l-8.4 8.6a6 6 0 0 0 8.5 8.5l8.4-8.6"/>
          </svg>
        </button>
        <div id="input-text-layer">
          <div id="input-highlight" aria-hidden="true"></div>
          <textarea id="user-input" data-i18n-placeholder="sp.input.ask_placeholder" rows="1"></textarea>
        </div>
        <button id="btn-mic" data-i18n-title="sp.btn.mic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <path d="M12 19v3"/>
            <path d="M8 22h8"/>
          </svg>
        </button>
        <button id="btn-send" data-i18n-title="sp.btn.send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
