<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <base href="https://example.com/docs/">
  <title>Fixture: anchor base href click</title>
</head>
<body>
  <nav>
    <a href="#References" onclick="event.preventDefault()">References</a>
  </nav>
  <main>
    <h1>Article</h1>
    <p>The raw fragment href resolves against the base URL, not this file URL.</p>
    <h2 id="References">References</h2>
  </main>
</body>
</html>
