<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fixture: anchor click</title>
  <style>
    body { font-family: system-ui; margin: 0; }
    nav { position: sticky; top: 0; background: white; border-bottom: 1px solid #ccc; padding: 16px 24px; }
    main { padding: 24px; }
    .spacer { min-height: 1400px; }
    #References { scroll-margin-top: 80px; }
  </style>
</head>
<body>
  <nav>
    <a href="#References">References</a>
  </nav>
  <main>
    <h1>Article</h1>
    <p>This fixture keeps the target below the fold so a same-page anchor click must update the hash and scroll.</p>
    <div class="spacer"></div>
    <h2 id="References">References</h2>
    <ol>
      <li>Fixture source one.</li>
      <li>Fixture source two.</li>
    </ol>
  </main>
</body>
</html>
